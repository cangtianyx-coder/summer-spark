name: SummerSpark
options:
  bundleIdPrefix: com.summerspark
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: src/App/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.summerspark.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  SummerSpark:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: src
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: src/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.summerspark.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: configs/SummerSpark.entitlements
    entitlements:
      path: configs/SummerSpark.entitlements
      properties:
        com.apple.developer.healthkit: false
        com.apple.security.application-groups:
          - group.com.summerspark.app
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.summerspark.app
