name: Build iOS IPA

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

env:
  SCHEME: SummerSpark
  WORKSPACE: SummerSpark.xcodeproj
  CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Export IPA
    runs-on: macos-14
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks
      
      - name: List project info
        run: |
          xcodebuild -list -project SummerSpark.xcodeproj || true
      
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-${{ hashFiles('**/*.swift', '**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-derived-
      
      - name: Build app (unsigned)
        run: |
          # Clean previous builds
          rm -rf build/
          
          # Build for generic iOS platform (device)
          xcodebuild \
            -project SummerSpark.xcodeproj \
            -scheme SummerSpark \
            -configuration ${{ env.CONFIGURATION }} \
            -derivedDataPath build/DerivedData \
            -destination 'generic/platform=iOS' \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            GCC_PREPROCESSOR_DEFINITIONS='$GCC_PREPROCESSOR_DEFINITIONS CODE_SIGNING_ALLOWED=NO' \
            2>&1 | tee build.log
          
          # Check if build succeeded
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ Build succeeded"
          else
            echo "❌ Build failed, showing last 100 lines:"
            tail -100 build.log
            exit 1
          fi
      
      - name: Create IPA (ad-hoc, no signing)
        run: |
          # The .app should be in Build/Products/Release-iphoneos/ or Debug-iphoneos/
          CONFIG_LOWER=$(echo "${{ env.CONFIGURATION }}" | tr '[:upper:]' '[:lower:]')
          APP_PATH="build/DerivedData/Build/Products/${{ env.CONFIGURATION }}-iphoneos/SummerSpark.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "Trying alternate locations..."
            APP_PATH=$(find build/DerivedData -path "*/Products/*-iphoneos/SummerSpark.app" -type d | head -1)
          fi
          
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ SummerSpark.app not found"
            echo "DerivedData structure:"
            find build/DerivedData -type d -name "*.app" 2>/dev/null || true
            find build/DerivedData -type d -name "Products" 2>/dev/null || true
            exit 1
          fi
          
          echo "✅ Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          
          # Create Payload directory and copy app
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          
          # Create IPA
          cd build
          zip -qr SummerSpark.ipa Payload
          mv SummerSpark.ipa ../SummerSpark.ipa
          
          echo "✅ IPA created successfully"
          ls -lh ../SummerSpark.ipa
      
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SummerSpark-IPA-${{ github.sha }}
          path: SummerSpark.ipa
          retention-days: 30
      
      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SummerSpark.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: Notify on build status
  notify:
    name: Notify Build Status
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Build succeeded
        if: needs.build.result == 'success'
        run: |
          echo "✅ iOS build completed successfully!"
          echo "IPA available in workflow artifacts"
      
      - name: Build failed
        if: needs.build.result == 'failure'
        run: |
          echo "❌ iOS build failed"
          echo "Check the build job logs for details"
