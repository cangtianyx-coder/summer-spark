name: Build iOS IPA

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

env:
  SCHEME: SummerSpark
  CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}

jobs:
  build:
    name: Build and Export IPA
    runs-on: macos-14
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -E "iOS|iphoneos" || true
      
      - name: Show project structure
        run: |
          echo "Project files:"
          ls -la
          echo ""
          echo "Xcode project:"
          xcodebuild -list -project SummerSpark.xcodeproj 2>&1 || true
      
      - name: Build app for device (unsigned)
        id: build
        run: |
          set +e
          
          xcodebuild \
            -project SummerSpark.xcodeproj \
            -scheme SummerSpark \
            -configuration ${{ env.CONFIGURATION }} \
            -derivedDataPath DerivedData \
            -destination 'generic/platform=iOS' \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build_output.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          echo "build_exit_code=$BUILD_EXIT_CODE" >> $GITHUB_OUTPUT
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo ""
            echo "❌ Build failed with exit code: $BUILD_EXIT_CODE"
            echo ""
            echo "Last 50 lines of build output:"
            tail -50 build_output.log
            exit 1
          fi
          
          echo ""
          echo "✅ Build succeeded"
      
      - name: Find and package app
        run: |
          echo "Searching for SummerSpark.app..."
          echo ""
          
          # Show DerivedData structure
          echo "DerivedData directories:"
          find DerivedData -type d -maxdepth 4 2>/dev/null | head -30
          echo ""
          
          # Find the .app
          APP_PATH=$(find DerivedData -name "SummerSpark.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ SummerSpark.app not found in DerivedData"
            echo ""
            echo "All .app files found:"
            find DerivedData -name "*.app" -type d 2>/dev/null || echo "None"
            exit 1
          fi
          
          echo "✅ Found app at: $APP_PATH"
          echo ""
          echo "App contents:"
          ls -la "$APP_PATH"
          echo ""
          
          # Create IPA
          echo "Creating IPA..."
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr SummerSpark.ipa Payload
          
          echo ""
          echo "✅ IPA created:"
          ls -lh SummerSpark.ipa
      
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SummerSpark-IPA-${{ github.run_number }}
          path: SummerSpark.ipa
          retention-days: 30
      
      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SummerSpark.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
