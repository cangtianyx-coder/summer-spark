name: Build iOS IPA

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Info
        run: |
          echo "Runner: $(uname -a)"
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios || true
          ls -la
      
      - name: Build
        run: |
          xcodebuild \
            -project SummerSpark.xcodeproj \
            -scheme SummerSpark \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log
          
          grep -q "BUILD SUCCEEDED" build.log || { tail -50 build.log; exit 1; }
      
      - name: Package
        run: |
          APP=$(find build -name "SummerSpark.app" -type d | head -1)
          test -n "$APP" || { find build -type d -name "*.app"; exit 1; }
          echo "App: $APP"
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -rq SummerSpark.ipa Payload
          ls -lh SummerSpark.ipa
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SummerSpark-IPA
          path: SummerSpark.ipa
          retention-days: 30
